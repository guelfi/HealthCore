services:
  healthcore-api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${HEALTHCORE_ENVIRONMENT:-Production}
      Jwt__Key: ${HEALTHCORE_JWT_KEY:?HEALTHCORE_JWT_KEY must be set}
      Jwt__Issuer: ${HEALTHCORE_JWT_ISSUER:-HealthCore.Api}
      Jwt__Audience: ${HEALTHCORE_JWT_AUDIENCE:-HealthCore.Client}
      Security__RefreshCookieSecure: ${HEALTHCORE_SECURE_COOKIES:-true}
      HEALTHCORE_E2E_USERNAME: ${HEALTHCORE_E2E_USERNAME:-}
      HEALTHCORE_E2E_PASSWORD: ${HEALTHCORE_E2E_PASSWORD:-}
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - healthcore_data:/app/database
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: healthcore.batuara.net' http://localhost:5000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  healthcore-frontend:
    build:
      context: .
      dockerfile: src/Web/Dockerfile
      args:
        VITE_API_URL: ${HEALTHCORE_API_URL:-}
        VITE_BASE_PATH: ${HEALTHCORE_BASE_PATH:-/healthcore/}
    restart: unless-stopped
    ports:
      - "127.0.0.1:5005:8080"
    depends_on:
      healthcore-api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.2"
          memory: 128M

volumes:
  healthcore_data:
    driver: local